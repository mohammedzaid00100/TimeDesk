<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stopwatch — TimeDesk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="main-area">
    <section class="section">
      <div class="center-column">
        <div id="stopwatchDisplay" class="big-time">00:00:00</div>
        <div class="controls">
          <button id="startStopwatchBtn" class="action-btn">Start</button>
          <button id="stopStopwatchBtn" class="action-btn">Stop</button>
          <button id="resetStopwatchBtn" class="action-btn">Reset</button>
        </div>
      </div>
    </section>
  </main>

  <script src="stopwatch.js"></script>
</body>
</html>
