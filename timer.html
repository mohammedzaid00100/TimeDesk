<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Timer — TimeDesk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="main-area">
    <section class="section">
      <div class="center-column">
        <input id="timerInput" class="timer-input" type="number" min="1" placeholder="Minutes" />
        <div id="timerDisplay" class="big-time">00:00</div>
        <div class="controls">
          <button id="startTimerBtn" class="action-btn">Start</button>
          <button id="resetTimerBtn" class="action-btn">Reset</button>
        </div>
      </div>
    </section>
  </main>

  <script src="timer.js"></script>
</body>
</html>
